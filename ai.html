<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wordle Deluxe</title>
<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #fce4ec, #e3f2fd);
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    margin: 0;
  }

  h1 { margin-top: 30px; font-size: 2.5rem; color: #333; }

  .grid {
    display: grid;
    grid-template-rows: repeat(6, 1fr);
    gap: 10px;
    margin-top: 20px;
  }

  .row {
    display: grid;
    grid-template-columns: repeat(5, 60px);
    gap: 10px;
  }

  .tile {
    width: 60px;
    height: 60px;
    border-radius: 10px;
    border: 2px solid #ddd;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 26px;
    font-weight: bold;
    text-transform: uppercase;
    background: white;
    transition: 0.2s;
  }

  .tile.filled { border-color: #888; }
  .correct { background: #4caf50; color: white; }
  .present { background: #ffc107; color: white; }
  .absent { background: #f44336; color: white; }

  #message { margin-top: 20px; font-size: 18px; font-weight: 500; }
  .hint { margin-top: 10px; color: #666; }
</style>
</head>
<body>

<h1>Wordle Deluxe</h1>
<div class="hint">Type letters • Enter = submit • Backspace = delete</div>

<div class="grid" id="grid"></div>
<div id="message">Loading dictionary...</div>

<script>
// small answer pool
const answerWords = ["apple","grape","pearl","stone","chair","table","plant","light","brain","sweet","crane","flame"];

// full dictionary will load here
let validWords = new Set();
let dictionaryLoaded = false;

let answer = "";
let currentRow = 0;
let currentCol = 0;
let currentGuess = "";

const grid = document.getElementById("grid");
const messageEl = document.getElementById("message");

function initGrid() {
  grid.innerHTML = "";
  for (let i = 0; i < 6; i++) {
    const row = document.createElement("div");
    row.className = "row";
    for (let j = 0; j < 5; j++) {
      const tile = document.createElement("div");
      tile.className = "tile";
      row.appendChild(tile);
    }
    grid.appendChild(row);
  }
}

function newGame() {
  answer = answerWords[Math.floor(Math.random() * answerWords.length)];
  currentRow = 0;
  currentCol = 0;
  currentGuess = "";
  messageEl.textContent = "";
  initGrid();
}

function updateTile(letter) {
  if (currentCol < 5 && dictionaryLoaded) {
    const tile = grid.children[currentRow].children[currentCol];
    tile.textContent = letter;
    tile.classList.add("filled");
    currentGuess += letter;
    currentCol++;
  }
}

function deleteLetter() {
  if (currentCol > 0) {
    currentCol--;
    const tile = grid.children[currentRow].children[currentCol];
    tile.textContent = "";
    tile.classList.remove("filled");
    currentGuess = currentGuess.slice(0, -1);
  }
}

function isValidWord(word) {
  return validWords.has(word.toLowerCase());
}

function submitGuess() {
  if (!dictionaryLoaded) return;

  if (currentGuess.length !== 5) return;

  if (!isValidWord(currentGuess)) {
    messageEl.textContent = "Not a real word!";
    return;
  }

  const row = grid.children[currentRow];
  const answerLetters = answer.split("");

  for (let i = 0; i < 5; i++) {
    const tile = row.children[i];
    const letter = currentGuess[i];

    if (letter === answer[i]) {
      tile.classList.add("correct");
    } else if (answerLetters.includes(letter)) {
      tile.classList.add("present");
    } else {
      tile.classList.add("absent");
    }
  }

  if (currentGuess === answer) {
    messageEl.textContent = "You got it! New word...";
    setTimeout(newGame, 1500);
    return;
  }

  currentRow++;
  currentCol = 0;
  currentGuess = "";

  if (currentRow === 6) {
    messageEl.textContent = "Out of tries! Word was: " + answer;
    setTimeout(newGame, 2000);
  }
}

// load real dictionary (5-letter words)
fetch("https://raw.githubusercontent.com/tabatkins/wordle-list/main/words")
  .then(res => res.text())
  .then(text => {
    const words = text.split("\n");
    validWords = new Set(words.map(w => w.trim().toLowerCase()));
    dictionaryLoaded = true;
    messageEl.textContent = "";
    newGame();
  })
  .catch(() => {
    messageEl.textContent = "Failed to load dictionary";
  });

window.addEventListener("keydown", (e) => {
  if (e.key === "Backspace") deleteLetter();
  else if (e.key === "Enter") submitGuess();
  else if (/^[a-zA-Z]$/.test(e.key)) updateTile(e.key.toLowerCase());
});
</script>

</body>
</html>
